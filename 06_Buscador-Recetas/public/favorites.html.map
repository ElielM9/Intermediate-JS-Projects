<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodSearch | Favoritos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <!-- Cabecera con logo, título y botón para volver al inicio -->
    <header class="flex flex-col justify-center items-center pt-8 bg-white">
      <h1 class="text-2xl font-bold text-gray-900">FoodSearch</h1>
      <a
        href="index.html"
        class="btn btn-primary p-2 rounded-md transition-colors duration-300 hover:bg-amber-500 hover:text-white"
      >
        Volver al inicio
      </a>
    </header>
    <!-- Sección Main del proyecto -->
    <main class="mt-5 bg-gray-100">
      <section class="max-w-4xl mx-auto p-8">
        <h2 class="text-2xl font-bold text-gray-900 text-center mt-5">
          Tus Favoritos
        </h2>
        <p class="text-gray-700 mt-2 text-center">
          Aquí están tus comidas y recetas favoritas.
        </p>
        <!-- Grid de los favoritos -->
        <div
          id="recipes-container"
          class="favorites-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-7"
        >
          <!-- Tarjeta de favoritos con imagen, nombre y botón de eliminar -->
        </div>
      </section>
    </main>

    <!-- Modal para mostrar instrucciones de recetas -->
    <div
      id="modal-container"
      class="modal modal-container fixed inset-0 hidden"
      tabindex="-1"
      aria-labelledby="modal-label"
    >
      <div
        class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20"
      >
        <!-- Fondo del modal oscurecido -->
        <div class="fixed inset-0 bg-gray-700 opacity-75"></div>

        <!-- Contenedor del modal -->
        <div
          class="relative sm:my-5 rounded-lg p-6 w-full max-w-lg max-h-[90vh] bg-white shadow-lg overflow-y-auto transform transition-all"
        >
          <header class="flex justify-between items-center mb-4">
            <h2 class="modal__title text-lg font-bold"></h2>
          </header>
          <div class="modal__body mb-4"></div>
          <footer
            class="modal__footer flex justify-end flex-col sm:flex-row gap-3"
          ></footer>
        </div>
      </div>
    </div>

    <!-- Toast para mostrar mensajes de error -->
    <div class="toast-container hidden fixed top-0 right-0 p-3">
      <div
        class="toast transition-opacity duration-500 ease-in-out"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <header class="toast-header bg-red-500 text-white p-1">
          <strong class="me-auto text-white">FoodSearch</strong>
          <button
            type="button"
            class="btn-close btn-close-white"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </header>
        <div class="toast-body bg-red-200 p-1">
          <p>¡Ups! Algo salió mal, por favor intenta de nuevo.</p>
        </div>
      </div>
    </div>

    <script src="./js/main.js"></script>
  </body>
</html>
